services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Docker uses Host=db (internal service name), not the CONNECTION_STRING from .env
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Secret:       ${JWT_SECRET}
      Jwt__Issuer:       ${JWT_ISSUER}
      Jwt__Audience:     ${JWT_AUDIENCE}
      Jwt__ExpiryHours:  "${JWT_EXPIRY_HOURS}"
      ALLOWED_ORIGINS:   ${ALLOWED_ORIGINS}
      Admin__Username:   ${ADMIN_USERNAME}
      Admin__Password:   ${ADMIN_PASSWORD}
      App__CompanyName:  ${COMPANY_NAME}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/wwwroot/uploads

volumes:
  postgres_data:
  uploads_data:
